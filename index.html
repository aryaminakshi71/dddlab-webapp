<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDDL Gurugram | Brochure + Lab App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a2342;
      --teal: #0e7c7b;
      --gold: #c9973a;
      --paper: #f5f1ea;
      --white: #ffffff;
      --ink: #1f2937;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Source Sans 3", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, rgba(14, 124, 123, 0.08), transparent 30%),
        radial-gradient(circle at 90% 15%, rgba(201, 151, 58, 0.08), transparent 32%),
        var(--paper);
      min-height: 100vh;
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 20px;
      background: rgba(10, 35, 66, 0.94);
      color: var(--white);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(201, 151, 58, 0.35);
    }

    .title {
      display: grid;
      gap: 4px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
    }

    .title h1 {
      font-family: "Playfair Display", serif;
      font-size: clamp(18px, 2.1vw, 28px);
      line-height: 1.1;
      color: #ffd993;
      font-weight: 900;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: 14px;
      transition: transform 0.2s ease, filter 0.2s ease;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); filter: brightness(1.06); }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #e8b84b);
      color: var(--navy);
    }

    .btn-outline {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.35);
      color: var(--white);
    }

    .shell {
      width: min(96vw, 1320px);
      margin: 18px auto 26px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(10, 35, 66, 0.18);
      box-shadow: 0 18px 45px rgba(10, 35, 66, 0.2);
      background: var(--white);
    }

    .shell-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      background: #eaf3f8;
      border-bottom: 1px solid #dbe4ef;
      font-size: 13px;
    }

    .brochure-frame {
      width: 100%;
      height: calc(100vh - 190px);
      min-height: 640px;
      border: 0;
      background: #fff;
    }

    .foot-note {
      width: min(96vw, 1320px);
      margin: 0 auto 24px;
      font-size: 13px;
      color: #475569;
      text-align: center;
    }

    @media (max-width: 900px) {
      .top {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .brochure-frame {
        min-height: 76vh;
        height: 76vh;
      }
    }

    @media print {
      .top, .shell-head, .foot-note { display: none !important; }
      .shell {
        width: 100%;
        margin: 0;
        border: 0;
        box-shadow: none;
      }
      .brochure-frame {
        height: auto;
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="title">
      <p class="eyebrow">Animal Husbandry Department, Haryana Government</p>
      <h1>DDDL Gurugram Laboratory Services</h1>
    </div>
    <nav class="actions" aria-label="Primary Actions">
      <a class="btn btn-outline" href="./brochure.html" target="_blank" rel="noopener">Open Brochure Only</a>
      <a class="btn btn-primary" href="./app.html">Open Lab App</a>
    </nav>
  </header>

  <section class="shell" aria-label="Laboratory Brochure Preview">
    <div class="shell-head">
      <span>Brochure shown first as requested.</span>
      <span>Continue to portal: <strong>/app.html</strong></span>
    </div>
    <iframe class="brochure-frame" src="./brochure.html" title="DDDL Gurugram Brochure"></iframe>
  </section>

  <p class="foot-note">
    If the embedded brochure does not load in your browser, use <strong>Open Brochure Only</strong> and then continue to <strong>Open Lab App</strong>.
  </p>
</body>
</html>
